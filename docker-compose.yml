version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: game_bot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - game_bot_network

  redis:
    image: redis:alpine
    container_name: game_bot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - game_bot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game_bot_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/game-recommendations
      - REDIS_URL=redis://redis:6379
      - RAWG_API_KEY=${RAWG_API_KEY}
    depends_on:
      - mongo
      - redis
    networks:
      - game_bot_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: game_bot_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - game_bot_network

volumes:
  mongo_data:
  redis_data:

networks:
  game_bot_network:
    driver: bridge
